<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Glitch.dfont</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Handjet:wght@300..900&family=Silkscreen:wght@400;700&display=swap");

    :root {
      color-scheme: light;
      --desktop: #b9b9b9;
      --chrome: #CECECE;
      --surface-flat: #C2C2C2;
      --chrome-2: var(--surface-flat);
      --chrome-3: var(--surface-flat);
      --hi: #f2f2f2;
      --lo: #777777;
      --deep: #242424;
      --ink: #383838;
      --muted: #787878;
      --label-muted: #686868;
      --soft-line: #8c8c8c;
      --lcd: var(--surface-flat);
      --lcd-dark: var(--surface-flat);
      --accent: #E09C31;
      --danger: #575757;
      --bevel-hi: #e7e7e7;
      --bevel-lo: #747474;
      --dock-bevel-lo: #6d6d6d;
      --popover-bevel-lo: #4d4d4d;
      --popover-surface: var(--chrome);
      --popover-lcd: var(--lcd);
      --popover-shadow: #868686;
      --section-line: #858585;
      --inset-lo: #8b8b8b;
      --inset-hi: #eeeeee;
      --input-inset-lo: #9f9f9f;
      --control-bevel-lo: #8a8a8a;
      --control-bevel-hi: #d7d7d7;
      --tick-mark: #5f5f5f;
      --range-thumb-width: 21px;
      --range-thumb-height: 19px;
      --range-thumb-half: 10.5px;
      --range-bevel-size: 2px;
      --corner-button-offset: 12px;
      --topbar-content-offset-y: 0px;
      --corner-button-top: calc((var(--topbar-h) - 20px) / 2 + var(--topbar-content-offset-y));
      --topbar-h: 40px;
      --dock-h: 82px;
      --raised-bevel:
        inset 2px 2px 0 var(--bevel-hi),
        inset -2px -2px 0 var(--bevel-lo);
      --dock-bevel:
        inset 2px 2px 0 var(--bevel-hi),
        inset -2px -2px 0 var(--dock-bevel-lo);
      --screen-body-bevel:
        inset 2px 0 0 var(--inset-lo),
        inset -2px -2px 0 var(--inset-hi);
      --control-bevel:
        inset -2px -2px 0 var(--control-bevel-lo),
        inset 2px 2px 0 var(--control-bevel-hi);
      --pressed-bevel: inset 2px 2px 0 var(--inset-lo);
      --input-bevel: inset 2px 2px 0 var(--input-inset-lo);
      --popover-bevel:
        inset 2px 2px 0 var(--bevel-hi),
        inset -2px -2px 0 var(--popover-bevel-lo),
        4px 4px 0 var(--popover-shadow);
    }

    * { box-sizing: border-box; }

    html { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100%;
      padding: var(--topbar-h) 0 var(--dock-h);
      overflow-x: hidden;
      overflow-y: auto;
      background: var(--desktop);
      color: var(--muted);
      font-family: "Handjet", "Courier New", Monaco, ui-monospace, monospace;
      font-weight: 700;
      font-smooth: never;
      -webkit-font-smoothing: none;
      text-rendering: geometricPrecision;
    }

    /* ---------- top bar ---------- */
    .topbar {
      position: fixed;
      z-index: 6;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 40px;
      padding: 6px 12px;
      border: 3px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      border-right-color: var(--lo);
      border-bottom-color: var(--lo);
      background: var(--chrome);
      box-shadow: none;
    }

    .topbar h1 {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, calc(-50% + var(--topbar-content-offset-y)));
      margin: 0;
      color: var(--deep);
      font-size: 20px;
      line-height: 1;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 700;
      letter-spacing: 0;
      text-shadow: none;
      white-space: nowrap;
    }

    .file-name {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(calc(-50% + var(--topbar-content-offset-y)));
      min-height: 24px;
      display: inline-flex;
      align-items: center;
      padding: 0 6px;
      border: 1px solid var(--soft-line);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd);
      color: var(--ink);
      font-size: 12px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(24vw, 240px);
    }

    .info-toggle {
      position: fixed;
      top: var(--corner-button-top);
      right: var(--corner-button-offset);
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      min-width: 20px;
      height: 20px;
      min-height: 20px;
      margin: 0;
      padding: 0;
      border: 0;
      background-color: var(--chrome-3);
      background-image:
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo));
      background-position:
        left top,
        left var(--range-bevel-size),
        left bottom,
        right var(--range-bevel-size);
      background-size:
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size)),
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size));
      background-repeat: no-repeat;
      box-shadow: none;
      transform: none;
      font-size: 16px;
      line-height: 1;
      z-index: 7;
    }

    .info-toggle:active {
      background-image:
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo));
      box-shadow: none;
      transform: none;
    }

    .info-window {
      position: fixed;
      z-index: 8;
      top: 0;
      right: 0;
      width: min(500px, 100vw);
      padding: 0;
      border: 3px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      border-right-color: var(--popover-bevel-lo);
      border-bottom-color: var(--popover-bevel-lo);
      background: var(--popover-surface);
      box-shadow: none;
    }

    .info-window[hidden] {
      display: none;
    }

    .info-close {
      position: fixed;
      z-index: 9;
      right: var(--corner-button-offset);
      top: var(--corner-button-top);
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      min-width: 20px;
      height: 20px;
      min-height: 20px;
      margin: 0;
      padding: 0;
      border: 0;
      background-color: var(--chrome-3);
      background-image:
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo));
      background-position:
        left top,
        left var(--range-bevel-size),
        left bottom,
        right var(--range-bevel-size);
      background-size:
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size)),
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size));
      background-repeat: no-repeat;
      box-shadow: none;
      font-size: 16px;
      line-height: 1;
    }

    .info-close:active {
      background-image:
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo));
      box-shadow: none;
      transform: none;
    }

    .info-panels {
      display: grid;
      grid-template-columns: 1fr;
    }

    .info-panel {
      min-height: 0;
      padding: 8px 10px 10px;
      box-sizing: border-box;
      border-bottom: 0;
      background: var(--popover-surface);
      color: var(--label-muted);
      box-shadow: none;
    }

    .info-panel:not(:has(.info-fold[open])) {
      height: 40px;
      padding-top: 0;
      padding-bottom: 0;
      display: flex;
      align-items: center;
      background-image: linear-gradient(var(--lo), var(--lo));
      background-position: left bottom;
      background-size: 100% 2px;
      background-repeat: no-repeat;
    }

    .info-panel:has(.info-fold[open]) {
      height: auto;
      display: block;
      background-image: linear-gradient(var(--lo), var(--lo));
      background-position: left bottom;
      background-size: 100% 2px;
      background-repeat: no-repeat;
    }

    .info-panel:last-child {
      border-bottom: 0;
    }

    .info-fold {
      margin: 0;
      width: 100%;
    }

    .info-panel summary {
      margin: 0 32px 0 0;
      height: 24px;
      min-height: 24px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--label-muted);
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 14px;
      font-weight: 400;
      line-height: 1;
      text-transform: uppercase;
      cursor: pointer;
      list-style: none;
      user-select: none;
    }

    .info-panel summary::-webkit-details-marker {
      display: none;
    }

    .info-panel summary::before {
      content: "+";
      width: 12px;
      min-width: 12px;
      color: var(--accent);
      text-align: center;
    }

    .info-fold[open] summary::before {
      content: "-";
    }

    .info-fold[open] summary {
      margin-bottom: 9px;
    }

    .info-panel-body {
      margin: 0;
      min-height: 64px;
      padding: 8px;
      border: 2px solid var(--lo);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd);
      color: var(--ink);
      font-size: 17px;
      font-weight: 500;
      line-height: 1.15;
      box-shadow: none;
    }

    .info-panel-body p {
      margin: 0;
    }

    /* ---------- stacked screens: phrase, then full typeface ---------- */
    .screens {
      min-height: calc(100vh - var(--topbar-h) - var(--dock-h));
      display: flex;
      flex-direction: column;
      overflow: visible;
      background: var(--chrome-2);
    }

    .screen {
      min-width: 0;
      flex: 0 0 auto;
      min-height: calc((100vh - var(--topbar-h) - var(--dock-h)) / 2);
      display: flex;
      flex-direction: column;
      border: 2px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      border-right-color: var(--lo);
      border-bottom-color: var(--lo);
      background: var(--chrome);
      box-shadow: none;
    }

    .screen:last-child { border-bottom-color: var(--lo); }

    .screen-head {
      position: sticky;
      top: var(--topbar-h);
      z-index: 4;
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      height: 46px;
      min-height: 46px;
      margin: 0;
      padding: 0 10px;
      border: none;
      background: var(--chrome);
      color: var(--muted);
      font-size: 17px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-shadow: none;
      box-shadow: none;
    }

    .screen-head::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: 0;
      height: 2px;
      background: var(--lo);
      pointer-events: none;
    }

    .screen-head > span {
      flex: 0 0 auto;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 17px;
      line-height: 1;
      transform: translateY(-2px);
    }

    .screen-head .tag {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .head-cap {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      color: var(--deep);
      font-size: 12px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: none;
      flex: 0 1 auto;
    }
    .head-cap .readout {
      color: var(--ink);
      font-family: "Handjet", "Silkscreen", ui-monospace, monospace;
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      text-transform: lowercase;
    }
    .head-cap input[type="range"] {
      width: 100%;
    }

    .screen-body {
      flex: 1 0 auto;
      min-height: 0;
      margin: 0 8px 8px;
      padding: 14px;
      border: 2px solid var(--lo);
      border-top: none;
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd);
      font-weight: 700;
      box-shadow: none;
    }

    .screen-body:has(> .empty) {
      display: grid;
    }

    /* glyph canvases */
    .render-canvas {
      display: block;
      image-rendering: pixelated;
      max-width: none;
    }

    .phrase-stack { display: flex; align-items: center; justify-content: center; width: 100%; min-height: 0; }
    .phrase-line { display: flex; align-items: center; justify-content: center; gap: 6px; max-width: 100%; }
    .phrase-caret {
      flex: none;
      width: 4px;
      align-self: center;
      background: var(--deep);
      opacity: 0.35;
    }
    #phraseBody { display: grid; place-items: center; cursor: text; }
    #phraseBody.typing { outline: 1px dotted var(--deep); outline-offset: -5px; }
    #phraseBody.drag-over {
      outline: 2px solid var(--accent);
      outline-offset: -7px;
    }
    #phraseBody.typing .phrase-caret { animation: caret-blink 1.06s steps(1) infinite; }
    @keyframes caret-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .phrase-hint {
      font-size: 20px;
      font-family: "Handjet", "Silkscreen", ui-monospace, monospace;
      font-weight: 700;
      line-height: 1;
      text-transform: none;
      letter-spacing: 0;
      color: var(--muted);
      pointer-events: none;
    }

    .spec-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 18px; }
    .spec-section:last-child { margin-bottom: 0; }

    .spec-label {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 20px;
      font-family: "Handjet", "Silkscreen", ui-monospace, monospace;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: none;
    }

    .spec-label::after {
      content: "";
      flex: 1;
      height: 2px;
      border: none;
      background: var(--accent);
    }

    .empty {
      display: grid;
      place-content: center;
      width: 100%;
      min-height: 100%;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.35;
    }

    .empty strong { color: var(--ink); font-weight: inherit; }

    .empty.error strong, .error-text { color: var(--danger); }

    .empty .upload-inline {
      display: inline;
      color: var(--deep);
      text-decoration: none;
      cursor: pointer;
    }

    /* ---------- bottom dock ---------- */
    .dock {
      --dock-control-h: 28px;
      position: fixed;
      z-index: 6;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: stretch;
      gap: 0;
      min-height: var(--dock-h);
      border: 2px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      border-right-color: var(--lo);
      border-bottom-color: var(--lo);
      background: var(--chrome);
      box-shadow: none;
    }

    .dock-cell {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 5px;
      padding: 8px 10px;
      border-right: 2px solid var(--lo);
      box-shadow: none;
    }

    .dock-cell.res,
    .dock-cell.glitch { flex: 1 1 0; min-width: 180px; }
    .dock-cell.file { flex: 0 0 180px; min-width: 170px; }
    .dock-cell.actions { flex: 0 0 180px; min-width: 170px; border-right: none; }

    .dock label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      color: var(--label-muted);
      font-size: 14px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .dock label .readout {
      color: var(--ink);
      font-family: "Handjet", "Silkscreen", ui-monospace, monospace;
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
      text-transform: lowercase;
    }

    input[type="file"] { display: none; }

    .dock .file-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: var(--dock-control-h);
      padding: 0 10px;
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome-3);
      color: var(--deep);
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: var(--control-bevel);
      white-space: nowrap;
    }
    .dock .file-btn .arrow { font-size: 12px; line-height: 1; transform: translateY(-1px); }
    .dock .file-btn:focus-visible { outline: 1px dotted var(--ink); outline-offset: 3px; }
    .dock .file-btn:active {
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      box-shadow: var(--pressed-bevel);
      transform: translate(1px, 1px);
    }

    input[type="text"] {
      width: 100%;
      min-height: 30px;
      padding: 0 8px;
      border: 1px solid var(--soft-line);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd);
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      box-shadow: var(--input-bevel);
    }

    .preview-text-proxy {
      position: fixed;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      min-height: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      clip-path: inset(50%);
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
    }

    /* range with ticks */
    .range-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .slider-control {
      --fill-end: 50%;
      --thumb-left: calc(50% - var(--range-thumb-half));
      position: relative;
      display: block;
      width: 100%;
      height: 24px;
      flex: none;
    }

    .head-cap .slider-control {
      width: 122px;
      max-width: 38vw;
    }

    .slider-track-visual {
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 11px;
      transform: translateY(-50%);
      overflow: hidden;
      padding: var(--range-bevel-size);
      border: 0;
      background-color: var(--lcd-dark);
      background-image:
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi));
      background-position:
        left top,
        left var(--range-bevel-size),
        left bottom,
        right var(--range-bevel-size);
      background-size:
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size)),
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size));
      background-repeat: no-repeat;
      pointer-events: none;
    }

    .slider-control::after {
      content: "";
      position: absolute;
      z-index: 1;
      top: 50%;
      left: var(--thumb-left);
      width: var(--range-thumb-width);
      height: var(--range-thumb-height);
      border: 0;
      background-color: var(--chrome-3);
      background-image:
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo));
      background-position:
        left top,
        left var(--range-bevel-size),
        left bottom,
        right var(--range-bevel-size);
      background-size:
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size)),
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size));
      background-repeat: no-repeat;
      box-shadow: none;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .slider-control:has(input[type="range"]:active)::after {
      background-image:
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi));
    }

    .slider-control.disabled {
      opacity: 0.55;
    }

    .slider-fill-visual {
      display: flex;
      gap: 2px;
      width: var(--fill-end);
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .slider-fill-visual span {
      flex: 0 0 8px;
      height: 100%;
      background: var(--accent);
    }

    input[type="range"] {
      position: absolute;
      z-index: 2;
      inset: -7px 0 -7px 0;
      width: 100%;
      height: 38px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      opacity: 0;
      background: transparent;
      cursor: pointer;
    }
    input[type="range"]:disabled { cursor: not-allowed; opacity: 0.55; }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 38px;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: var(--range-thumb-width);
      height: var(--range-thumb-height);
      background: transparent;
    }

    input[type="range"]::-moz-range-track {
      height: 38px;
      background: transparent;
      border: 0;
    }

    input[type="range"]::-moz-range-thumb {
      width: var(--range-thumb-width);
      height: var(--range-thumb-height);
      border: 0;
      background: transparent;
      border-radius: 0;
    }

    .ticks {
      position: relative;
      height: 25px;
      margin: 0 var(--range-thumb-half);
      font-size: 16px;
      font-family: "Handjet", "Silkscreen", ui-monospace, monospace;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .ticks span {
      position: absolute;
      left: var(--tick-position, 0%);
      top: 0;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
    }
    .ticks span.on { color: var(--ink); }
    .ticks span::before {
      content: "";
      display: block;
      width: 2px;
      height: 5px;
      margin: 0 auto 2px;
      background: var(--tick-mark);
    }
    .ticks.disabled span { opacity: 0.4; }

    button {
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome-3);
      color: var(--deep);
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      cursor: pointer;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      box-shadow: var(--control-bevel);
      min-height: 30px;
      padding: 0 10px;
      white-space: nowrap;
    }
    button:not(.info-toggle):not(.info-close):active {
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      box-shadow: var(--pressed-bevel);
      transform: translate(1px, 1px);
    }
    button.ghost { background: var(--chrome); color: var(--ink); }
    button[aria-expanded="true"] {
      background: var(--lcd);
      color: var(--deep);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
    }

    .dfont-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px;
    }
    .sample-select {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      min-height: var(--dock-control-h);
      padding: 0 20px 0 6px;
      border: 1px solid var(--soft-line);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background-color: var(--lcd);
      background-image:
        linear-gradient(45deg, transparent 50%, var(--ink) 50%),
        linear-gradient(135deg, var(--ink) 50%, transparent 50%);
      background-position:
        calc(100% - 12px) 11px,
        calc(100% - 7px) 11px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      color: var(--ink);
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
      box-shadow: var(--input-bevel);
    }
    .sample-select:disabled {
      color: var(--muted);
      opacity: 0.7;
    }
    .dock-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 4px;
    }
    .dfont-actions .file-btn,
    .dock-actions button {
      min-width: 0;
      min-height: var(--dock-control-h);
      padding: 0 7px;
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome-3);
      color: var(--deep);
      box-shadow: var(--control-bevel);
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .dock-actions .reroll { background: var(--chrome-2); }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--dock-control-h);
      padding: 0 10px;
      border: 1px solid var(--lo);
      color: var(--deep);
      background: var(--chrome-3);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      text-decoration: none;
      text-align: center;
    }

    .dock .dock-button {
      --button-surface: var(--chrome-3);
      appearance: none;
      -webkit-appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-width: 0;
      min-height: var(--dock-control-h);
      margin: 0;
      padding: 0 7px;
      border: 0;
      background-color: var(--button-surface);
      background-image:
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo));
      background-position:
        left top,
        left var(--range-bevel-size),
        left bottom,
        right var(--range-bevel-size);
      background-size:
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size)),
        100% var(--range-bevel-size),
        var(--range-bevel-size) calc(100% - var(--range-bevel-size) - var(--range-bevel-size));
      background-repeat: no-repeat;
      color: var(--deep);
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0;
      text-align: center;
      text-decoration: none;
      text-transform: uppercase;
      white-space: nowrap;
      cursor: pointer;
      box-shadow: none;
    }

    .dock .dock-button:active {
      background-image:
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi));
      box-shadow: none;
    }

    .download[aria-disabled="true"] {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .download[aria-disabled="true"]:active {
      background-image:
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--hi), var(--hi)),
        linear-gradient(var(--lo), var(--lo)),
        linear-gradient(var(--lo), var(--lo));
      box-shadow: none;
      transform: none;
    }

    @media (max-width: 720px) {
      body { padding: var(--topbar-h) 0 var(--dock-h); }
      .topbar {
        min-height: 40px;
        padding: 6px 8px;
      }
      .topbar h1 { font-size: 18px; }
      .file-name {
        position: absolute;
        left: 8px;
        right: auto;
        top: 50%;
        bottom: auto;
        z-index: 6;
        max-width: 24vw;
      }
      .screen-head { height: 42px; min-height: 42px; padding: 0 8px; font-size: 16px; }
      .screen-head > span { font-size: 16px; }
      .head-cap {
        width: auto;
        justify-content: space-between;
        font-size: 11px;
      }
      .head-cap .slider-control { width: 110px; max-width: 44vw; }
      .screen-body { margin: 6px; padding: 10px; }
      .dock { flex-wrap: wrap; min-height: 0; }
      .dock-cell { flex: 1 1 128px; border-right-width: 2px; border-bottom: 2px solid var(--lo); }
      .dock-cell.file { min-width: 170px; }
      .dock-cell.actions { flex-basis: 180px; min-width: 170px; }
    }

    .info-window .info-panel summary {
      font-size: 14px;
    }

    .topbar,
    .info-window,
    .screen,
    .screen-head,
    .screen-body,
    .dock,
    .file-name,
    .info-panel-body,
    input[type="text"],
    button,
    .download {
      border: 0;
      background-image:
        linear-gradient(var(--edge-top-color), var(--edge-top-color)),
        linear-gradient(var(--edge-left-color), var(--edge-left-color)),
        linear-gradient(var(--edge-bottom-color), var(--edge-bottom-color)),
        linear-gradient(var(--edge-right-color), var(--edge-right-color));
      background-position:
        left top,
        left top,
        left bottom,
        right top;
      background-size:
        100% var(--edge-top-size, var(--edge-size)),
        var(--edge-left-size, var(--edge-size)) 100%,
        100% var(--edge-bottom-size, var(--edge-size)),
        var(--edge-right-size, var(--edge-size)) 100%;
      background-repeat: no-repeat;
      box-shadow: none;
    }

    .topbar {
      --edge-size: 3px;
      --edge-top-color: var(--hi);
      --edge-left-color: var(--hi);
      --edge-right-color: var(--lo);
      --edge-bottom-color: var(--lo);
    }

    .info-window {
      --edge-size: 3px;
      --edge-top-color: var(--hi);
      --edge-left-color: var(--hi);
      --edge-right-color: var(--lo);
      --edge-bottom-color: var(--lo);
    }

    .info-panel + .info-panel {
      background-image: linear-gradient(var(--lo), var(--lo));
      background-position: left top;
      background-size: 100% 2px;
      background-repeat: no-repeat;
    }

    .screen,
    .dock {
      --edge-size: 3px;
      --edge-top-color: var(--hi);
      --edge-left-color: var(--hi);
      --edge-right-color: var(--lo);
      --edge-bottom-color: var(--lo);
    }

    .dock {
      --edge-size: 3px;
    }

    .screen-head {
      --edge-size: 3px;
      --edge-bottom-size: 0px;
      --edge-top-color: var(--hi);
      --edge-left-color: var(--hi);
      --edge-right-color: var(--lo);
      --edge-bottom-color: transparent;
    }

    .file-name,
    input[type="text"] {
      --edge-top-color: var(--lo);
      --edge-left-color: var(--lo);
      --edge-right-color: var(--hi);
      --edge-bottom-color: var(--hi);
    }

    .file-name {
      --edge-size: 2px;
    }

    input[type="text"] {
      --edge-size: 1px;
    }

    .screen-body,
    .info-panel-body {
      --edge-size: 2px;
      --edge-top-size: 0px;
      --edge-top-color: var(--lo);
      --edge-left-color: var(--lo);
      --edge-right-color: var(--hi);
      --edge-bottom-color: var(--hi);
    }

    button,
    .download {
      --edge-size: var(--range-bevel-size);
      --edge-top-color: var(--hi);
      --edge-left-color: var(--hi);
      --edge-right-color: var(--lo);
      --edge-bottom-color: var(--lo);
    }

    button:not(.info-toggle):not(.info-close):active,
    .download:not([aria-disabled="true"]):active {
      --edge-top-color: var(--lo);
      --edge-left-color: var(--lo);
      --edge-right-color: var(--hi);
      --edge-bottom-color: var(--hi);
      box-shadow: none;
    }

    .info-window {
      border: 0;
      background-color: var(--popover-surface);
      background-image: none;
      box-shadow: none;
    }

    .info-window::before,
    .info-window .info-panel-body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(var(--edge-top-color), var(--edge-top-color)),
        linear-gradient(var(--edge-left-color), var(--edge-left-color)),
        linear-gradient(var(--edge-bottom-color), var(--edge-bottom-color)),
        linear-gradient(var(--edge-right-color), var(--edge-right-color));
      background-position:
        left top,
        left top,
        left bottom,
        right top;
      background-size:
        100% var(--edge-top-size, var(--edge-size)),
        var(--edge-left-size, var(--edge-size)) 100%,
        100% var(--edge-bottom-size, var(--edge-size)),
        var(--edge-right-size, var(--edge-size)) 100%;
      background-repeat: no-repeat;
    }

    .info-window::before {
      --edge-size: 3px;
      --edge-bottom-size: 0px;
      --edge-top-color: var(--hi);
      --edge-left-color: var(--hi);
      --edge-right-color: var(--lo);
      --edge-bottom-color: var(--lo);
      background-size:
        100% var(--edge-top-size, var(--edge-size)),
        var(--edge-left-size, var(--edge-size)) calc(100% - 3px),
        100% var(--edge-bottom-size, var(--edge-size)),
        var(--edge-right-size, var(--edge-size)) 100%;
      z-index: 1;
    }

    .info-window::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 1px;
      pointer-events: none;
      background: var(--lo);
    }

    .info-window .info-panel {
      border: 0;
    }

    .info-window .info-panel + .info-panel {
      background-image: linear-gradient(var(--lo), var(--lo));
      background-position: left bottom;
      background-size: 100% 2px;
      background-repeat: no-repeat;
    }

    .info-window .info-panel-body {
      position: relative;
      border: 0;
      background-color: var(--popover-lcd);
      background-image: none;
      box-shadow: none;
    }

    .info-window .info-panel-body::before {
      --edge-size: 2px;
      --edge-top-size: var(--edge-size);
      --edge-top-color: var(--lo);
      --edge-left-color: var(--lo);
      --edge-right-color: var(--hi);
      --edge-bottom-color: var(--hi);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Glitch.dfont</h1>
    <span id="fileName" class="file-name">no file loaded</span>
    <button id="infoToggle" class="info-toggle" type="button" aria-controls="infoWindow" aria-expanded="false" aria-label="Project info">?</button>
  </header>

  <aside id="infoWindow" class="info-window" hidden aria-label="Project information">
    <button id="infoClose" class="info-close" type="button" aria-label="Close">X</button>
    <div class="info-panels">
      <section class="info-panel" aria-labelledby="aboutTitle">
        <details class="info-fold">
          <summary id="aboutTitle">About</summary>
          <div class="info-panel-body">
            <p>[About placeholder]</p>
          </div>
        </details>
      </section>
      <section class="info-panel" aria-labelledby="makeDfontTitle">
        <details class="info-fold">
          <summary id="makeDfontTitle">How to make .dfont</summary>
          <div class="info-panel-body">
            <p>[How to make .dfont placeholder]</p>
          </div>
        </details>
      </section>
      <section class="info-panel" aria-labelledby="glitchTitle">
        <details class="info-fold">
          <summary id="glitchTitle">How to glitch</summary>
          <div class="info-panel-body">
            <p>[How to glitch placeholder]</p>
          </div>
        </details>
      </section>
    </div>
  </aside>

  <main class="screens">
    <section class="screen" data-screen-label="Your text">
      <div class="screen-head">
        <span>Your text</span>
        <label class="head-cap" for="phraseHeightInput">
          Cap height <span id="phraseHeightReadout" class="readout">96 px</span>
          <span class="slider-control">
            <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
            <input id="phraseHeightInput" type="range" min="24" max="360" step="4" value="96" />
          </span>
        </label>
      </div>
      <div id="phraseBody" class="screen-body">
        <div class="empty">
          <div><label class="upload-inline" for="fileInput">Upload .dfont</label><br />or drop it here.</div>
        </div>
      </div>
      <input id="previewText" class="preview-text-proxy" type="text" value="Glitch" autocomplete="off" spellcheck="false" aria-label="Your text" />
    </section>

    <section class="screen" data-screen-label="Typeface">
      <div class="screen-head">
        <span>Typeface</span>
        <label class="head-cap" for="typeHeightInput">
          Cap height <span id="typeHeightReadout" class="readout">96 px</span>
          <span class="slider-control">
            <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
            <input id="typeHeightInput" type="range" min="24" max="360" step="4" value="96" />
          </span>
        </label>
      </div>
      <div id="typeBody" class="screen-body">
        <div class="empty">
          <div>The full character set<br />appears here.</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="dock">
    <div class="dock-cell file">
      <label for="fileInput">Source</label>
      <div class="dfont-actions">
        <label class="file-btn dock-button" for="fileInput"><span>Upload source</span></label>
      </div>
      <select id="sampleSelect" class="sample-select">
        <option value="">Choose source</option>
      </select>
      <input id="fileInput" type="file" accept=".dfont,.rsrc,application/octet-stream" />
    </div>

    <div class="dock-cell res">
      <label>Resolution <span id="resReadout" class="readout">—</span></label>
      <div class="range-wrap">
        <div class="slider-control">
          <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
          <input id="resInput" type="range" min="0" max="0" step="1" value="0" disabled />
        </div>
        <div id="resTicks" class="ticks disabled"></div>
      </div>
    </div>

    <div class="dock-cell glitch">
      <label for="glitchInput">
        Glitch probability <span id="glitchValue" class="readout">0%</span>
      </label>
      <div class="range-wrap">
        <span class="slider-control">
          <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
          <input id="glitchInput" type="range" min="0" max="30" step="1" value="0" />
        </span>
        <div id="glitchTicks" class="ticks">
          <span data-value="0" style="--tick-position: 0%">0</span>
          <span data-value="5" style="--tick-position: 16.6667%">5</span>
          <span data-value="10" style="--tick-position: 33.3333%">10</span>
          <span data-value="15" style="--tick-position: 50%">15</span>
          <span data-value="20" style="--tick-position: 66.6667%">20</span>
          <span data-value="25" style="--tick-position: 83.3333%">25</span>
          <span data-value="30" style="--tick-position: 100%">30</span>
        </div>
      </div>
    </div>

    <div class="dock-cell glitch">
      <label for="maxOffsetInput">
        Maximum offset <span id="maxOffsetValue" class="readout">±32</span>
      </label>
      <div class="range-wrap">
        <span class="slider-control">
          <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
          <input id="maxOffsetInput" type="range" min="1" max="128" step="1" value="32" />
        </span>
        <div id="maxOffsetTicks" class="ticks">
          <span data-value="1" style="--tick-position: 0%">1</span>
          <span data-value="32" style="--tick-position: 24.4094%">32</span>
          <span data-value="64" style="--tick-position: 49.6063%">64</span>
          <span data-value="96" style="--tick-position: 74.8031%">96</span>
          <span data-value="128" style="--tick-position: 100%">128</span>
        </div>
      </div>
    </div>

    <div class="dock-cell actions">
      <div class="dock-actions">
        <a id="downloadDfont" class="download dock-button" aria-disabled="true">Download glitch</a>
        <button id="rerollButton" type="button" class="dock-button">Re-glitch</button>
        <button id="resetButton" type="button" class="dock-button">Reset</button>
      </div>
    </div>
  </footer>

  <script src="font-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
