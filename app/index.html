<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DFontAMP bitmap glitch lab</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Handjet:wght@300..900&family=Silkscreen:wght@400;700&display=swap");

    :root {
      color-scheme: light;
      --desktop: #b9b9b9;
      --chrome: #CECECE;
      --surface-flat: #C2C2C2;
      --chrome-2: var(--surface-flat);
      --chrome-3: var(--surface-flat);
      --hi: #f2f2f2;
      --lo: #777777;
      --deep: #242424;
      --ink: #383838;
      --muted: #787878;
      --soft-line: #8c8c8c;
      --lcd: var(--surface-flat);
      --lcd-dark: var(--surface-flat);
      --accent: #E09C31;
      --danger: #575757;
      --bevel-hi: #e7e7e7;
      --bevel-lo: #747474;
      --dock-bevel-lo: #6d6d6d;
      --popover-bevel-lo: #4d4d4d;
      --popover-shadow: #868686;
      --section-line: #858585;
      --inset-lo: #8b8b8b;
      --inset-hi: #eeeeee;
      --input-inset-lo: #9f9f9f;
      --control-bevel-lo: #8a8a8a;
      --control-bevel-hi: #d7d7d7;
      --tick-mark: #5f5f5f;
      --dock-h: 82px;
      --raised-bevel:
        inset 1px 1px 0 var(--bevel-hi),
        inset -1px -1px 0 var(--bevel-lo);
      --dock-bevel:
        inset 1px 1px 0 var(--bevel-hi),
        inset -1px -1px 0 var(--dock-bevel-lo);
      --screen-body-bevel:
        inset 1px 0 0 var(--inset-lo),
        inset -1px -1px 0 var(--inset-hi);
      --control-bevel:
        inset -1px -1px 0 var(--control-bevel-lo),
        inset 1px 1px 0 var(--control-bevel-hi);
      --pressed-bevel: inset 1px 1px 0 var(--inset-lo);
      --input-bevel: inset 1px 1px 0 var(--input-inset-lo);
      --popover-bevel:
        inset 1px 1px 0 var(--bevel-hi),
        inset -1px -1px 0 var(--popover-bevel-lo),
        4px 4px 0 var(--popover-shadow);
    }

    * { box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--desktop);
      color: var(--ink);
      font-family: "Handjet", "Courier New", Monaco, ui-monospace, monospace;
      font-smooth: never;
      -webkit-font-smoothing: none;
      text-rendering: geometricPrecision;
    }

    /* ---------- top bar ---------- */
    .topbar {
      flex: none;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      padding: 6px 12px;
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      border-right-color: var(--lo);
      border-bottom-color: var(--lo);
      background: var(--chrome);
      box-shadow: var(--raised-bevel);
    }

    .topbar h1 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      color: var(--deep);
      font-size: 21px;
      line-height: 1;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 700;
      letter-spacing: 0;
      text-shadow: 1px 1px 0 var(--hi);
      white-space: nowrap;
    }

    .file-name {
      position: absolute;
      left: 12px;
      top: 7px;
      padding: 3px 6px;
      border: 1px solid var(--soft-line);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd);
      color: var(--muted);
      font-size: 10px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: min(24vw, 240px);
    }

    /* ---------- stacked screens: phrase, then full typeface ---------- */
    .screens {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--chrome-2);
      scrollbar-color: var(--lo) var(--chrome);
    }

    .screen {
      min-width: 0;
      flex: 0 0 auto;
      min-height: 50%;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      border-right-color: var(--lo);
      border-bottom-color: var(--lo);
      background: var(--chrome);
      box-shadow: var(--raised-bevel);
    }

    .screen:last-child { border-bottom-color: var(--lo); }

    .screen-head {
      position: sticky;
      top: 0;
      z-index: 4;
      flex: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 36px;
      margin: 0;
      padding: 5px 10px;
      border: none;
      background: var(--chrome);
      color: var(--muted);
      font-size: 28px;
      font-family: "Handjet", "Silkscreen", ui-monospace, monospace;
      font-weight: 300;
      letter-spacing: 0;
      text-shadow: 1px 1px 0 var(--hi);
      box-shadow: inset 0 1px 0 var(--bevel-hi);
    }

    .screen-head::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      bottom: -1px;
      height: 2px;
      background: var(--section-line);
      pointer-events: none;
    }

    .screen-head > span {
      flex: 0 0 auto;
    }

    .screen-head .tag {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .head-cap {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
      color: var(--deep);
      font-size: 9px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 900;
      text-transform: uppercase;
      text-shadow: none;
      flex: 0 1 auto;
    }
    .head-cap .readout {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }
    .head-cap input[type="range"] {
      width: 100%;
    }

    .screen-body {
      flex: 1 0 auto;
      min-height: 0;
      margin: 0 8px 8px;
      padding: 14px;
      border: 1px solid var(--soft-line);
      border-top: none;
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd);
      box-shadow: var(--screen-body-bevel);
    }

    /* glyph canvases */
    .render-canvas {
      display: block;
      image-rendering: pixelated;
      max-width: none;
    }

    .phrase-stack { display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center; width: 100%; min-height: 100%; }
    .phrase-line { display: flex; align-items: center; justify-content: center; gap: 6px; max-width: 100%; }
    .phrase-caret {
      flex: none;
      width: 4px;
      align-self: center;
      background: var(--deep);
      opacity: 0.35;
    }
    #phraseBody { cursor: text; }
    #phraseBody.typing { outline: 1px dotted var(--deep); outline-offset: -5px; }
    #phraseBody.typing .phrase-caret { animation: caret-blink 1.06s steps(1) infinite; }
    @keyframes caret-blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .phrase-hint {
      font-size: 11px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0;
      color: var(--muted);
      pointer-events: none;
    }

    .spec-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 18px; }
    .spec-section:last-child { margin-bottom: 0; }

    .spec-label {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .spec-label::after {
      content: "";
      flex: 1;
      height: 1px;
      border: none;
      background: var(--accent);
    }

    .spec-label .count {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
    }

    .empty {
      display: grid;
      place-content: center;
      min-height: 220px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .empty strong { color: var(--ink); }

    .empty.error strong, .error-text { color: var(--danger); }

    /* ---------- bottom dock ---------- */
    .dock {
      flex: none;
      position: relative;
      z-index: 5;
      display: flex;
      align-items: stretch;
      gap: 0;
      min-height: var(--dock-h);
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome);
      box-shadow: var(--dock-bevel);
    }

    .dock-cell {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      padding: 8px 10px;
      border-right: 2px solid var(--lo);
      box-shadow: inset 1px 0 0 var(--hi);
    }

    .dock-cell.res { flex: 0 1 230px; min-width: 190px; }
    .dock-cell.glitch { flex: 1 1 190px; min-width: 180px; }
    .dock-cell.file { flex: 0 0 auto; min-width: 138px; }
    .dock-cell.actions { flex: 0 0 270px; border-right: none; }

    .dock label {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 9px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .dock label .readout {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    input[type="file"] { display: none; }

    .dock .file-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome-3);
      color: var(--deep);
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: inset -1px -1px 0 var(--lo), inset 1px 1px 0 var(--bevel-hi);
      white-space: nowrap;
    }
    .dock .file-btn .arrow { font-size: 12px; line-height: 1; transform: translateY(-1px); }
    .dock .file-btn:focus-visible { outline: 1px dotted var(--ink); outline-offset: 3px; }
    .dock .file-btn:active {
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      box-shadow: var(--pressed-bevel);
      transform: translate(1px, 1px);
    }

    input[type="text"] {
      width: 100%;
      min-height: 30px;
      padding: 0 8px;
      border: 1px solid var(--soft-line);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd);
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      box-shadow: var(--input-bevel);
    }

    .preview-text-proxy {
      position: fixed;
      left: 0;
      top: 0;
      width: 1px;
      height: 1px;
      min-height: 0;
      padding: 0;
      border: 0;
      overflow: hidden;
      clip-path: inset(50%);
      opacity: 0;
      pointer-events: none;
      box-shadow: none;
    }

    /* range with ticks */
    .range-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .slider-control {
      --fill-end: 50%;
      --thumb-left: calc(50% - 9.5px);
      position: relative;
      display: block;
      width: 100%;
      height: 24px;
      flex: none;
    }

    .head-cap .slider-control {
      width: 122px;
      max-width: 38vw;
    }

    .slider-track-visual {
      position: absolute;
      left: 0;
      right: 0;
      top: 7px;
      height: 11px;
      overflow: hidden;
      border: 1px solid var(--soft-line);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      background: var(--lcd-dark);
      pointer-events: none;
    }

    .slider-control::after {
      content: "";
      position: absolute;
      z-index: 1;
      top: 3px;
      left: var(--thumb-left);
      width: 19px;
      height: 19px;
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome-3);
      box-shadow: var(--control-bevel);
      pointer-events: none;
    }

    .slider-control:has(input[type="range"]:active)::after {
      top: 4px;
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      box-shadow: var(--pressed-bevel);
    }

    .slider-control.disabled {
      opacity: 0.55;
    }

    .slider-fill-visual {
      display: flex;
      gap: 2px;
      width: var(--fill-end);
      height: 100%;
      overflow: hidden;
      pointer-events: none;
    }

    .slider-fill-visual span {
      flex: 0 0 8px;
      height: 100%;
      background: var(--accent);
    }

    input[type="range"] {
      position: absolute;
      z-index: 2;
      inset: -7px 0 -7px 0;
      width: 100%;
      height: 38px;
      margin: 0;
      appearance: none;
      -webkit-appearance: none;
      opacity: 0;
      background: transparent;
      cursor: pointer;
    }
    input[type="range"]:disabled { cursor: not-allowed; opacity: 0.55; }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 38px;
      background: transparent;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 19px;
      height: 19px;
      background: transparent;
    }

    input[type="range"]::-moz-range-track {
      height: 38px;
      background: transparent;
      border: 0;
    }

    input[type="range"]::-moz-range-thumb {
      width: 19px;
      height: 19px;
      border: 0;
      background: transparent;
      border-radius: 0;
    }

    .ticks {
      position: relative;
      height: 14px;
      margin: 0 9.5px;
      font-size: 8px;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-weight: 700;
      letter-spacing: 0;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }
    .ticks span {
      position: absolute;
      left: var(--tick-position, 0%);
      top: 0;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
    }
    .ticks span.on { color: var(--ink); }
    .ticks span::before {
      content: "";
      display: block;
      width: 1px;
      height: 5px;
      margin: 0 auto 2px;
      background: var(--tick-mark);
    }
    .ticks.disabled span { opacity: 0.4; }

    button {
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome-3);
      color: var(--deep);
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      cursor: pointer;
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      box-shadow: var(--control-bevel);
      min-height: 30px;
      padding: 0 10px;
      white-space: nowrap;
    }
    button:active {
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      box-shadow: var(--pressed-bevel);
      transform: translate(1px, 1px);
    }
    button.ghost { background: var(--chrome); color: var(--ink); }
    button[aria-expanded="true"] {
      background: var(--lcd);
      color: var(--deep);
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
    }

    .dock-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
    }
    .dock-actions button,
    .dock-actions .download {
      min-width: 0;
      min-height: 30px;
      padding: 0 7px;
      border: 1px solid var(--lo);
      border-top-color: var(--hi);
      border-left-color: var(--hi);
      background: var(--chrome-3);
      color: var(--deep);
      box-shadow: var(--control-bevel);
      font-family: "Silkscreen", "Handjet", ui-monospace, monospace;
      font-size: 10px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .dock-actions .reroll { background: var(--chrome-2); }
    .dock-actions .download:active {
      border-top-color: var(--lo);
      border-left-color: var(--lo);
      border-right-color: var(--hi);
      border-bottom-color: var(--hi);
      box-shadow: var(--pressed-bevel);
      transform: translate(1px, 1px);
    }

    .download {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 30px;
      padding: 0 10px;
      border: 1px solid var(--lo);
      color: var(--deep);
      background: var(--chrome-3);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      text-decoration: none;
      text-align: center;
    }
    .download[hidden] { display: none; }

    @media (max-width: 720px) {
      body { padding: 0; }
      .topbar {
        min-height: 34px;
        padding: 5px 8px;
      }
      .topbar h1 { font-size: 18px; }
      .file-name {
        position: absolute;
        left: 8px;
        right: auto;
        top: 7px;
        bottom: auto;
        z-index: 6;
        max-width: 24vw;
      }
      .screen-head { min-height: 36px; padding: 4px 8px; font-size: 22px; }
      .head-cap {
        width: auto;
        justify-content: space-between;
        font-size: 9px;
      }
      .head-cap .slider-control { width: 110px; max-width: 44vw; }
      .screen-body { margin: 6px; padding: 10px; }
      .dock { flex-wrap: wrap; min-height: 0; }
      .dock-cell { flex: 1 1 128px; border-right-width: 2px; border-bottom: 2px solid var(--lo); }
      .dock-cell.file { min-width: 132px; }
      .dock-cell.res { min-width: 100%; }
      .dock-cell.actions { flex-basis: 270px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>DFontAMP</h1>
    <span id="fileName" class="file-name">no file loaded</span>
  </header>

  <main class="screens">
    <section class="screen" data-screen-label="Your text">
      <div class="screen-head">
        <span>Your text</span>
        <label class="head-cap" for="phraseHeightInput">
          Cap height <span id="phraseHeightReadout" class="readout">96 px</span>
          <span class="slider-control">
            <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
            <input id="phraseHeightInput" type="range" min="24" max="360" step="4" value="96" />
          </span>
        </label>
      </div>
      <div id="phraseBody" class="screen-body">
        <div class="empty">
          <div><strong>Upload a .dfont</strong><br />to glitch its bitmap strikes.</div>
        </div>
      </div>
      <input id="previewText" class="preview-text-proxy" type="text" value="Glitch" autocomplete="off" spellcheck="false" aria-label="Your text" />
    </section>

    <section class="screen" data-screen-label="Typeface">
      <div class="screen-head">
        <span>Typeface</span>
        <label class="head-cap" for="typeHeightInput">
          Cap height <span id="typeHeightReadout" class="readout">96 px</span>
          <span class="slider-control">
            <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
            <input id="typeHeightInput" type="range" min="24" max="360" step="4" value="96" />
          </span>
        </label>
      </div>
      <div id="typeBody" class="screen-body">
        <div class="empty">
          <div>The full character set<br />appears here.</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="dock">
    <div class="dock-cell file">
      <label for="fileInput">Source .dfont</label>
      <label class="file-btn" for="fileInput"><span class="arrow">▲</span><span>Upload</span></label>
      <input id="fileInput" type="file" accept=".dfont,.rsrc,application/octet-stream" />
    </div>

    <div class="dock-cell res">
      <label>Resolution <span id="resReadout" class="readout">—</span></label>
      <div class="range-wrap">
        <div class="slider-control">
          <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
          <input id="resInput" type="range" min="0" max="0" step="1" value="0" disabled />
        </div>
        <div id="resTicks" class="ticks disabled"></div>
      </div>
    </div>

    <div class="dock-cell glitch">
      <label for="glitchInput">
        Glitch probability <span id="glitchValue" class="readout">0%</span>
      </label>
      <div class="range-wrap">
        <span class="slider-control">
          <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
          <input id="glitchInput" type="range" min="0" max="30" step="1" value="0" />
        </span>
        <div id="glitchTicks" class="ticks">
          <span data-value="0" style="--tick-position: 0%">0</span>
          <span data-value="5" style="--tick-position: 16.6667%">5</span>
          <span data-value="10" style="--tick-position: 33.3333%">10</span>
          <span data-value="15" style="--tick-position: 50%">15</span>
          <span data-value="20" style="--tick-position: 66.6667%">20</span>
          <span data-value="25" style="--tick-position: 83.3333%">25</span>
          <span data-value="30" style="--tick-position: 100%">30</span>
        </div>
      </div>
    </div>

    <div class="dock-cell glitch">
      <label for="maxOffsetInput">
        Maximum offset <span id="maxOffsetValue" class="readout">±32</span>
      </label>
      <div class="range-wrap">
        <span class="slider-control">
          <span class="slider-track-visual"><span class="slider-fill-visual"></span></span>
          <input id="maxOffsetInput" type="range" min="1" max="128" step="1" value="32" />
        </span>
        <div id="maxOffsetTicks" class="ticks">
          <span data-value="1" style="--tick-position: 0%">1</span>
          <span data-value="32" style="--tick-position: 24.4094%">32</span>
          <span data-value="64" style="--tick-position: 49.6063%">64</span>
          <span data-value="96" style="--tick-position: 74.8031%">96</span>
          <span data-value="128" style="--tick-position: 100%">128</span>
        </div>
      </div>
    </div>

    <div class="dock-cell actions">
      <div class="dock-actions">
        <button id="resetButton" type="button" class="ghost">Reset</button>
        <button id="rerollButton" type="button" class="reroll">Re-glitch</button>
        <a id="downloadDfont" class="download" href="#" download hidden>Download</a>
      </div>
    </div>
  </footer>

  <script src="font-core.js"></script>
  <script src="app.js"></script>
</body>
</html>
